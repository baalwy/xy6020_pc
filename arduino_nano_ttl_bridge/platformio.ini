[env:nanoatmega328old]
platform = atmelavr
board = nanoatmega328
framework = arduino
upload_port = COM9
upload_speed = 57600
board_build.mcu = atmega328p
board_build.f_cpu = 16000000L
build_flags = -D ARDUINO_AVR_NANO

; Old bootloader settings
board_upload.maximum_size = 30720
board_upload.maximum_ram_size = 2048
